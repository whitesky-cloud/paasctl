name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          binary="paasctl-${VERSION}-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags="-s -w -X 'paasctl/cmd.Version=${VERSION}'" -o "dist/${binary}" .

      - name: Package tar.gz
        if: matrix.archive == 'tar.gz'
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          archive="paasctl-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar -C dist -czf "dist/${archive}" "paasctl-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Package zip
        if: matrix.archive == 'zip'
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          archive="paasctl-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.zip"
          cd dist
          zip "${archive}" "paasctl-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.exe"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
